name: docs

on:
  push:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-checks.yml"
      - ".markdownlint.json"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-checks.yml"
      - ".markdownlint.json"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: "**/*.md"

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --include-fragments
            --exclude "https://github.com/hemanth-create/Agent-Slack-plugin.*"
            "./**/*.md"
