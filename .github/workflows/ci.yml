name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Windows is the supported platform: the single-flight lock uses msvcrt and the
    # docs/setup target Windows. The checkout is not on a synced folder, so the
    # router's sync-root guard does not trip.
    name: lint + test (Windows / Python 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
